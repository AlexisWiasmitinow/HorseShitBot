#======================= Global Settings =======================

[global]
   workgroup = WORKGROUP
   server role = standalone server

   # %h resolves to the system hostname at runtime
   netbios name = %h
   server string = HorseShitBot Jetson (%h)

   # Guest access — no password needed from Windows/Mac
   map to guest = bad user
   guest account = jetson

   # Logging
   log file = /var/log/samba/log.%m
   max log size = 500
   logging = file
   log level = 1

   # Performance tuning for Jetson (gigabit eth / NVMe)
   socket options = TCP_NODELAY IPTOS_LOWDELAY
   read raw = yes
   write raw = yes
   use sendfile = yes

#======================= Share Definitions =======================

[horseshitbot]
   comment = HorseShitBot repo
   path = /home/jetson/HorseShitBot
   browseable = yes
   read only = no
   guest ok = yes
   force user = jetson
   create mask = 0664
   directory mask = 0775
